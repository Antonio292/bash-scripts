services:
  webserver:
    image: nginx:latest
    ports:
      - "8080:80"
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
  process-manager:
    image: php:8.2-fpm
    restart: unless-stopped
    volumes:
      - ./html:/usr/share/nginx/html

  api:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./api:/app
    command: node server.js
    ports:
      - "3000:3000"